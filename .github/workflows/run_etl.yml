name: Career-ROI ETL Pipeline

on:
  schedule:
    # Skrypt odpali się automatycznie w każdy poniedziałek o 3:00 w nocy (UTC)
    - cron: '0 3 * * 1'
  workflow_dispatch:
    # Ten magiczny przełącznik pozwala nam odpalać skrypt ręcznie z poziomu przeglądarki!

jobs:
  run-data-pipeline:
    runs-on: ubuntu-latest # Darmowy serwer Linuxa od GitHuba

    steps:
      - name: Pobranie kodu z repozytorium
        uses: actions/checkout@v4

      - name: Konfiguracja Pythona 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalacja bibliotek
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Uruchomienie skryptu ETL
        env:
          # Tutaj wyciągamy sekrety ze skarbca i ładujemy je do zmiennych
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          AZURE_DB_PASS: ${{ secrets.AZURE_DB_PASS }}
        run: python etl_pipeline.py
